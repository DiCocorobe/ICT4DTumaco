<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caribbean Flood Archive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha256-7pXvI56mI1X+X9A4uL3Z5lP3z0U6N5X6G5X7I56mI1X=" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; }
        #map { height: 80vh; width: 100%; }
        header { padding: 20px; text-align: center; }
        nav { background-color: #1f1f1f; padding: 10px; text-align: center; border-bottom: 2px solid #333; }
        nav a { color: #FFA500; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #FFD580; text-decoration: underline; }
        .legend { background-color: #1f1f1f; color: #e0e0e0; padding: 10px; border-radius: 5px; line-height: 20px; }
        .legend i { width: 15px; height: 15px; float: left; margin-right: 8px; border-radius: 50%; }
        .popup-content h3 { margin: 0 0 5px; color: #FFA500; }
        .popup-content p { margin: 2px 0; font-size: 0.9em; }
        .stats { padding: 20px; display: flex; justify-content: space-around; background: #1a1a1a; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 1.5em; font-weight: bold; color: #FFA500; }
        .stat-label { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <header>
        <h1>Historical Floods: Caribbean Region</h1>
        <p>A focused view of flood events in Caribbean islands and territories.</p>
    </header>
    <nav>
        <a href="index.html">Main View (All)</a>
        <a href="caribbean.html">Caribbean Region</a>
        <a href="andean.html">Pacific Coast Andean</a>
    </nav>
    <div id="map"></div>
    <div class="stats">
        <div class="stat-box"><div class="stat-val" id="total-floods">...</div><div class="stat-label">Total Events</div></div>
        <div class="stat-box"><div class="stat-val" id="high-intensity">...</div><div class="stat-label">High Intensity (Major)</div></div>
        <div class="stat-box"><div class="stat-val" id="fatalities">...</div><div class="stat-label">Total Fatalities Recorded</div></div>
    </div>

    <script>
        // Initialize Map centered on Caribbean
        var map = L.map('map').setView([18, -75], 5);

        // Dark Theme Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        function getColor(severity) {
            return severity >= 2   ? '#8B4000' : 
                   severity >= 1.5 ? '#FFA500' : 
                                     '#FFD580';
        }

        // Load Caribbean Data
        Papa.parse('caribbean_floods.csv', {
            download: true,
            header: true,
            complete: function(results) {
                var data = results.data;
                var totalDead = 0;
                var highCount = 0;

                data.forEach(function(row) {
                    if (row.lat && row.long) {
                        var severity = parseFloat(row.Severity);
                        var dead = parseInt(row.Dead) || 0;
                        totalDead += dead;
                        if (severity >= 2) highCount++;

                        var marker = L.circleMarker([parseFloat(row.lat), parseFloat(row.long)], {
                            radius: severity * 5,
                            fillColor: getColor(severity),
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);

                        var popupContent = `
                            <div class="popup-content">
                                <h3>${row.Country}</h3>
                                <p><strong>Date:</strong> ${row.Began}</p>
                                <p><strong>Source:</strong> ${row.MainCause}</p>
                                <p><strong>Area:</strong> ${row.Area}</p>
                                <p><strong>Fatalities:</strong> ${row.Dead || 'Unknown'}</p>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                    }
                });

                document.getElementById('total-floods').innerText = data.length - 1;
                document.getElementById('high-intensity').innerText = highCount;
                document.getElementById('fatalities').innerText = totalDead.toLocaleString();
            }
        });

        // Add Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend'),
                grades = [1, 1.5, 2],
                labels = ['Low Intensity', 'Medium Intensity', 'High Intensity'];
            
            div.innerHTML += '<strong>Flood Severity</strong><br>';
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i]) + '"></i> ' +
                    labels[i] + '<br>';
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
