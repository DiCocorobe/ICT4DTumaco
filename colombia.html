<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colombia Flood Archive (25 Years)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha256-7pXvI56mI1X+X9A4uL3Z5lP3z0U6N5X6G5X7I56mI1X=" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; }
        #map { height: 75vh; width: 100%; }
        header { padding: 15px; text-align: center; background-color: #1a1a1a; }
        nav { background-color: #222; padding: 10px; text-align: center; border-bottom: 2px solid #444; }
        nav a { color: #FFA500; text-decoration: none; margin: 0 12px; font-weight: bold; font-size: 0.9em; }
        nav a:hover { color: #FFD580; text-decoration: underline; }
        .controls { background: #1a1a1a; padding: 15px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; border-bottom: 1px solid #333; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        select, input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        .stats { padding: 15px; display: flex; justify-content: space-around; background: #1a1a1a; border-top: 1px solid #333; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 1.4em; font-weight: bold; color: #FFA500; }
        .stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; }
        .legend { background: rgba(30, 30, 30, 0.9); padding: 10px; border-radius: 5px; line-height: 18px; color: #fff; font-size: 12px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 50%; opacity: 0.8; }
    </style>
</head>
<body>
    <header>
        <h1>Colombia Flood Archive (2001-2026)</h1>
        <p>A 25-year focus on flooding "epicenters" and intensity across the country.</p>
    </header>
    <nav>
        <strong>Flood Archive:</strong>
        <a href="index.html">Main View</a>
        <a href="caribbean.html">Caribbean</a>
        <a href="andean.html">Pacific Andean</a>
        <a href="colombia.html" style="color: #fff; text-decoration: underline;">Colombia Focus</a>
        <span style="color: #444; margin: 0 10px;">|</span>
        <strong>Local Focus:</strong>
        <a href="comuna5.html">Tumaco Mangroves (Comuna 5)</a>
    </nav>
    
    <div class="controls">
        <div class="control-group">
            <label for="year-select">Filter Year:</label>
            <select id="year-select">
                <option value="all">All (2001-2026)</option>
                <!-- Generated by JS -->
            </select>
        </div>
        <div class="control-group">
            <label for="intensity-select">Min Intensity:</label>
            <select id="intensity-select">
                <option value="1">1.0 (Any)</option>
                <option value="1.5">1.5 (Medium)</option>
                <option value="2">2.0 (Major)</option>
            </select>
        </div>
    </div>

    <div id="map"></div>

    <div class="stats">
        <div class="stat-box"><div class="stat-val" id="total-floods">0</div><div class="stat-label">Events Shown</div></div>
        <div class="stat-box"><div class="stat-val" id="total-fatalities">0</div><div class="stat-label">Total Fatalities</div></div>
        <div class="stat-box"><div class="stat-val" id="max-severity">0</div><div class="stat-label">Max Intensity</div></div>
    </div>

    <script>
        // Layer definitions
        var naturalResources = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        var satelliteHybrid = L.layerGroup([
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO'
            })
        ]);

        // Initialize Map
        var map = L.map('map', {
            center: [4.5, -74.0],
            zoom: 6,
            layers: [naturalResources]
        });

        var baseMaps = {
            "Natural Resources (Satellite)": naturalResources,
            "Human Infrastructure (Hybrid)": satelliteHybrid
        };

        L.control.layers(baseMaps).addTo(map);

        var geojsonLayer;
        var rawData;

        function getColor(severity) {
            return severity >= 2   ? '#ff0000' :
                   severity >= 1.5 ? '#ffa500' :
                                     '#ffff00';
        }

        function updateMap() {
            if (!rawData) return;
            
            var selectedYear = document.getElementById('year-select').value;
            var minIntensity = parseFloat(document.getElementById('intensity-select').value);
            
            if (geojsonLayer) map.removeLayer(geojsonLayer);

            var totalDead = 0;
            var maxSev = 0;
            var count = 0;

            geojsonLayer = L.geoJSON(rawData, {
                filter: function(feature) {
                    var yearMatch = (selectedYear === 'all') || (feature.properties.year === selectedYear);
                    var intensityMatch = feature.properties.severity >= minIntensity;
                    var match = yearMatch && intensityMatch;
                    
                    if (match) {
                        totalDead += feature.properties.dead;
                        if (feature.properties.severity > maxSev) maxSev = feature.properties.severity;
                        count++;
                    }
                    return match;
                },
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: feature.properties.severity * 8,
                        fillColor: getColor(feature.properties.severity),
                        color: "#000",
                        weight: 1.5,
                        opacity: 1,
                        fillOpacity: 0.8
                    });
                },
                onEachFeature: function(feature, layer) {
                    var popupContent = `
                        <div style="color: #333; min-width: 150px;">
                            <h3 style="margin:0; color: #d35400;">${feature.properties.area || 'Colombia'}</h3>
                            <p><strong>Year:</strong> ${feature.properties.year}</p>
                            <p><strong>Cause:</strong> ${feature.properties.cause}</p>
                            <p><strong>Intensity:</strong> ${feature.properties.severity}</p>
                            <p><strong>Fatalities:</strong> ${feature.properties.dead}</p>
                        </div>
                    `;
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);

            document.getElementById('total-floods').innerText = count;
            document.getElementById('total-fatalities').innerText = totalDead.toLocaleString();
            document.getElementById('max-severity').innerText = maxSev.toFixed(1);
        }

        // Load GeoJSON natively
        fetch('colombia_floods.geojson')
            .then(response => response.json())
            .then(data => {
                rawData = data;
                
                // Populate Year Select
                var yearSelect = document.getElementById('year-select');
                var years = [...new Set(data.features.map(f => f.properties.year))].filter(y => y && !isNaN(y)).sort().reverse();
                
                years.forEach(year => {
                    var opt = document.createElement('option');
                    opt.value = year;
                    opt.innerHTML = year;
                    yearSelect.appendChild(opt);
                });

                updateMap();
            })
            .catch(error => console.error('Error loading GeoJSON:', error));

        document.getElementById('year-select').addEventListener('change', updateMap);
        document.getElementById('intensity-select').addEventListener('change', updateMap);

        // Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Intensity</strong><br>';
            div.innerHTML += '<i style="background:#ff0000"></i> Major (2.0+)<br>';
            div.innerHTML += '<i style="background:#ffa500"></i> Medium (1.5+)<br>';
            div.innerHTML += '<i style="background:#ffff00"></i> Low (1.0+)<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
