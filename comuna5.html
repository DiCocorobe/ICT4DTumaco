<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumaco Mangroves: Comuna 5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; }
        #map { height: 80vh; width: 100%; }
        header { padding: 20px; text-align: center; background: #2e7d32; color: white; }
        nav { background-color: #1b5e20; padding: 10px; text-align: center; border-bottom: 2px solid #003300; }
        nav a { color: #ffffff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #a5d6a7; text-decoration: underline; }
        .legend { background-color: white; padding: 10px; border-radius: 5px; line-height: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .legend i { width: 15px; height: 15px; float: left; margin-right: 8px; border-radius: 50%; border: 1px solid #999; }
        .popup-content h3 { margin: 0 0 5px; color: #2e7d32; }
        .popup-content p { margin: 2px 0; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>
        <h1>Tumaco Comuna 5: Mangroves & Land Limits</h1>
        <p>Focus: Iberia, Victoria & Obrero Neighborhoods</p>
    </header>
    <nav>
        <span style="color: #a5d6a7;">Flood Archive:</span>
        <a href="index.html">Main View</a>
        <a href="caribbean.html">Caribbean</a>
        <a href="andean.html">Pacific Andean</a>
        <span style="color: #4caf50; margin: 0 10px;">|</span>
        <span style="color: #fff; font-weight: bold;">Local Focus:</span>
        <a href="comuna5.html">Tumaco Mangroves</a>
    </nav>

    <div id="map"></div>

    <script>
        // Initialize Map centered on Tumaco Comuna 5
        var map = L.map('map').setView([1.802, -78.750], 15);

        // Standard Light Tiles for clarity in local view
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        const mangroveStyle = {
            "color": "#1b5e20",
            "weight": 2,
            "opacity": 0.8,
            "fillColor": "#2e7d32",
            "fillOpacity": 0.5
        };

        const targetNeighborhoods = [
            { name: "Iberia", coords: [1.8041, -78.7542], desc: "Barrio Iberia - Sector Comuna 5" },
            { name: "Unión Victoria", coords: [1.8015, -78.7510], desc: "Barrio Unión Victoria - Relación con esteros" },
            { name: "Obrero", coords: [1.8000, -78.7560], desc: "Barrio Obrero - Zona de expansión urbana" }
        ];

        targetNeighborhoods.forEach(n => {
            L.circleMarker(n.coords, {
                radius: 8,
                fillColor: "#e91e63",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map)
              .bindPopup(`<div class="popup-content"><h3>${n.name}</h3><p>${n.desc}</p></div>`);
        });

        // Load Mangrove Data
        fetch('mangroves_comuna5.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: mangroveStyle,
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup("<b>Mangrove Protection Zone:</b><br>" + (feature.properties.name || "Unnamed Mangrove Area"));
                    }
                }).addTo(map);
            });

        // Add Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Reference</strong><br>';
            div.innerHTML += '<i style="background: #2e7d32; border-radius: 0;"></i> Mangrove Zones<br>';
            div.innerHTML += '<i style="background: #e91e63;"></i> Target Neighborhoods<br>';
            return div;
        };
        legend.addTo(map);

        L.control.scale().addTo(map);
    </script>
</body>
</html>
