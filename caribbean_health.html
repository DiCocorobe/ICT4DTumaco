<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caribbean Health & Flood Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; }
        #map { height: 75vh; width: 100%; }
        header { padding: 15px; text-align: center; background: #1a1a1a; }
        nav { background: #222; padding: 10px; text-align: center; border-bottom: 2px solid #444; }
        nav a { color: #FFA500; text-decoration: none; margin: 0 12px; font-weight: bold; }
        .controls { padding: 15px; display: flex; justify-content: center; gap: 20px; background: #1a1a1a; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        .legend { background: rgba(30, 30, 30, 0.9); padding: 10px; border-radius: 5px; line-height: 18px; color: #fff; font-size: 12px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 50%; opacity: 0.8; }
        .health-icon { background: red; color: white; border-radius: 50%; text-align: center; font-weight: bold; line-height: 20px; border: 2px solid white; }
    </style>
</head>
<body>
    <header>
        <h1>Caribbean Coast: Health Facilities & Flood Risks</h1>
        <p>A focus on Barranquilla, Cartagena, Santa Marta, Riohacha & Montería.</p>
    </header>
    <nav>
        <a href="index.html">Main View</a>
        <a href="colombia.html">Colombia Focus</a>
        <a href="caribbean_health.html" style="color: #fff;">Health & Floods</a>
        <a href="comuna5.html">Tumaco Local</a>
    </nav>
    <div class="controls">
        <label>Select City:</label>
        <select id="city-select">
            <option value="all">All Caribbean Coast</option>
            <option value="BARRANQUILLA">Barranquilla</option>
            <option value="CARTAGENA">Cartagena</option>
            <option value="SANTA">Santa Marta</option>
            <option value="RIOHACHA">Riohacha</option>
            <option value="MONTERIA">Montería</option>
        </select>
    </div>
    <div id="map"></div>
    <script>
        var naturalLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        });
        var infraLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
            attribution: 'CARTO'
        });

        var map = L.map('map', { center: [10.5, -74.5], zoom: 7, layers: [naturalLayer] });
        L.control.layers({"Natural Resources": naturalLayer, "Human Infrastructure": infraLayer}).addTo(map);

        var floodLayer = L.layerGroup().addTo(map);
        var healthLayer = L.layerGroup().addTo(map);

        // Map City Centers
        var cityCoords = {
            "BARRANQUILLA": [10.9685, -74.7813],
            "CARTAGENA": [10.3910, -75.4794],
            "SANTA": [11.2408, -74.1990],
            "RIOHACHA": [11.5444, -72.9072],
            "MONTERIA": [8.7479, -75.8814]
        };

        function updateView() {
            var city = document.getElementById('city-select').value;
            if (city !== 'all') {
                map.setView(cityCoords[city], 13);
            } else {
                map.setView([10.5, -74.5], 7);
            }
        }

        // Load Floods
        Papa.parse('caribbean_floods.csv', {
            download: true, header: true, complete: function(results) {
                results.data.forEach(row => {
                    if (row.lat && row.long) {
                        L.circleMarker([row.lat, row.long], {
                            radius: row.Severity * 5, color: 'orange', fillOpacity: 0.6
                        }).bindPopup(`<b>Flood Event</b><br>Intensity: ${row.Severity}<br>Dead: ${row.Dead || 0}`).addTo(floodLayer);
                    }
                });
            }
        });

        // Load Health Facilities
        fetch('caribbean_health.geojson').then(r => r.json()).then(data => {
            L.geoJSON(data, {
                pointToLayer: function(f, l) {
                    return L.marker(l, {
                        icon: L.divIcon({
                            className: 'health-icon',
                            html: 'H',
                            iconSize: [20, 20]
                        })
                    });
                },
                onEachFeature: function(f, l) {
                    l.bindPopup(`<b>${f.properties.name}</b><br>Type: ${f.properties.type}<br>City: ${f.properties.city}`);
                }
            }).addTo(healthLayer);
        });

        document.getElementById('city-select').addEventListener('change', updateView);

        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>Legend</strong><br>' +
                            '<i style="background: orange"></i> Flood Area<br>' +
                            '<i style="background: red; border-radius: 0; color: white; text-align: center; width: 14px;">H</i> Health Facility';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
