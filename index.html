<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map of Tumaco, Colombia - Mangroves & Neighborhoods</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .map-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            font-size: 12px;
            line-height: 18px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="map-title">
        <h1 style="margin: 0; font-size: 1.2rem;">Tumaco: Mangroves & Neighborhoods</h1>
        <p style="margin: 5px 0 0; font-size: 0.8rem;">Mangrove occupation and city landmarks</p>
    </div>
    
    <div class="legend">
        <h4 style="margin: 0 0 5px;">Legend</h4>
        <div><i style="background: #2e7d32;"></i> Mangroves</div>
        <div><i style="background: #1976d2;"></i> Neighborhoods</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const map = L.map('map').setView([1.8067, -78.7647], 13);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Define Mangrove Style
        const mangroveStyle = {
            "color": "#1b5e20",
            "weight": 2,
            "opacity": 0.65,
            "fillColor": "#2e7d32",
            "fillOpacity": 0.5
        };

        // Neighborhood Data (Approximate Centers)
        const neighborhoods = [
            { name: "Viento Libre", coords: [1.8062, -78.7821] },
            { name: "Zona Rosa", coords: [1.8203, -78.7615] },
            { name: "La Libertad", coords: [1.8089, -78.7730] },
            { name: "La Libertad 2", coords: [1.8075, -78.7754] },
            { name: "Nueva Floresta", coords: [1.8035, -78.7783] },
            { name: "La Cordialidad", coords: [1.8196, -78.7355] },
            { name: "Centro", coords: [1.8075, -78.7682] },
            { name: "El Morro", coords: [1.8265, -78.7500] }
        ];

        // Add Neighborhood Markers
        neighborhoods.forEach(n => {
            L.circleMarker(n.coords, {
                radius: 6,
                fillColor: "#1976d2",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<b>Neighborhood:</b> ${n.name}`);
        });

        // Load Mangrove Data
        fetch('mangroves.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: mangroveStyle,
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup("<b>Area:</b> " + feature.properties.name);
                    }
                }).addTo(map);
            });

        // Add a scale bar
        L.control.scale().addTo(map);
    </script>
</body>
</html>
