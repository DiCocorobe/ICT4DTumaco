<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map: Iberia, Victoria & Obrero - Tumaco Mangroves</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .map-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-width: 300px;
        }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 12px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            font-size: 13px;
            line-height: 20px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
            border: 1px solid #999;
        }
    </style>
</head>
<body>
    <div class="map-title">
        <h1 style="margin: 0; font-size: 1.1rem;">Tumaco Comuna 5: Mangroves & Land Limits</h1>
        <p style="margin: 5px 0 0; font-size: 0.85rem;">Focus: Iberia, Victoria & Obrero Neighborhoods</p>
    </div>
    
    <div class="legend">
        <h4 style="margin: 0 0 5px; font-size: 14px;">Reference</h4>
        <div><i style="background: #2e7d32;"></i> Mangrove Zones</div>
        <div><i style="background: #e91e63; border-radius: 50%;"></i> Target Neighborhoods</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Zoomed in view on Comuna 5
        const map = L.map('map').setView([1.802, -78.750], 15);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const mangroveStyle = {
            "color": "#1b5e20",
            "weight": 2,
            "opacity": 0.8,
            "fillColor": "#2e7d32",
            "fillOpacity": 0.5
        };

        // Specific Neighborhoods: Iberia, Victoria (Unión Victoria), Obrero
        const targetNeighborhoods = [
            { name: "Iberia", coords: [1.8041, -78.7542], desc: "Barrio Iberia - Sector Comuna 5" },
            { name: "Unión Victoria", coords: [1.8015, -78.7510], desc: "Barrio Unión Victoria - Relación con esteros" },
            { name: "Obrero", coords: [1.8000, -78.7560], desc: "Barrio Obrero - Zona de expansión urbana" }
        ];

        targetNeighborhoods.forEach(n => {
            L.circleMarker(n.coords, {
                radius: 8,
                fillColor: "#e91e63",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map)
              .bindPopup(`<b>Neighborhood:</b> ${n.name}<br>${n.desc}`)
              .openTooltip(n.name, { permanent: true, direction: 'top', className: 'neighborhood-label' });
        });

        // Load focused mangrove data
        fetch('mangroves.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: mangroveStyle,
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup("<b>Mangrove Protection Zone:</b><br>" + feature.properties.name);
                    }
                }).addTo(map);
            });

        L.control.scale().addTo(map);
    </script>
</body>
</html>
