<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Dataset Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin-top: 0; text-align: center; }
        .description { text-align: center; color: #666; margin-bottom: 30px; }
        .upload-box { border: 2px dashed var(--secondary); padding: 50px; text-align: center; border-radius: 12px; margin-bottom: 30px; background: #ebf5fb; cursor: pointer; transition: all 0.3s; display: block; }
        .upload-box:hover { background: #d6eaf8; border-color: #2980b9; }
        #csv-file { display: none; }
        .table-wrap { overflow-x: auto; margin-top: 30px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: var(--secondary); color: white; position: sticky; top: 0; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        tr:hover { background: #fcfcfc; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .stat-card { background: #f8f9fa; padding: 10px 20px; border-radius: 6px; border: 1px solid #eee; font-weight: bold; font-size: 0.9rem; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--secondary); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Return to Landing Page</a>
        <h1>{{TITLE}}</h1>
        <p class="description">{{DESCRIPTION}}</p>
        
        <div class="stats" id="stats-area" style="display: none;">
            <div class="stat-card">Rows: <span id="row-count">0</span></div>
            <div class="stat-card">Columns: <span id="col-count">0</span></div>
        </div>

        <label for="csv-file" class="upload-box" id="drop-zone">
            <strong>📂 Select a CSV file</strong> or drag and drop it here
            <input type="file" id="csv-file" accept=".csv">
        </label>

        <div id="table-container" class="table-wrap"></div>
    </div>

    <script>
        const fileInput = document.getElementById('csv-file');
        const container = document.getElementById('table-container');
        const statsArea = document.getElementById('stats-area');
        const rowCount = document.getElementById('row-count');
        const colCount = document.getElementById('col-count');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        displayData(results.data, results.meta.fields);
                    }
                });
            }
        });

        function displayData(data, fields) {
            if (data.length === 0) return;
            
            statsArea.style.display = 'flex';
            rowCount.innerText = data.length.toLocaleString();
            colCount.innerText = fields.length;

            let html = '<table><thead><tr>';
            fields.forEach(f => html += `<th>${f}</th>`);
            html += '</tr></thead><tbody>';
            
            data.slice(0, 100).forEach(row => {
                html += '<tr>';
                fields.forEach(f => html += `<td>${row[f] || ''}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            if (data.length > 100) {
                html += `<div style="padding:15px; text-align:center; background:#f8f9fa; color:#666; font-size:0.85rem; border-top:1px solid #eee;">Showing first 100 rows.</div>`;
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
